id: variant_type
name: "std::variant"
group: "Standards"
has_ptrdata: false
doc_url: https://en.cppreference.com/w/cpp/utility/variant
standards: [11, 17, 20]
explanation: >-
  std::variant<A, B, ...> is a type-safe union: it holds exactly one of its
  alternative types and knows which. It is a C++17 LIBRARY feature — under
  -std=c++11 the <variant> header provides no std::variant, so the SAME source
  fails to compile there and compiles from C++17 on. It is the modern,
  type-checked replacement for a raw union or a void* tag-and-cast.
template: |
  #include <iostream>
  #include <variant>
  #include <string>
  int main() {
      // std::variant holds one of several types, safely — a C++17 feature.
      // Under -std=c++11 the <variant> header has no std::variant.
      std::variant<int, std::string> v = 42;
      std::cout << "holds int: " << std::get<int>(v) << "\n";
      // reassign to the other alternative
      v = std::string("hello");
      std::cout << "now holds: " << std::get<std::string>(v) << "\n";
  }
