id: op_plus
name: "operator+ (member)"
group: Operators
doc_url: https://en.cppreference.com/w/cpp/language/operators
has_ptrdata: false
explanation: >-
  A member operator's left operand is the object itself: a + b calls
  a.operator+(b). Arithmetic operators return a new value (not a reference), so
  the operands are left unchanged. Vec2 is a class, so its data is private:
  operator+ is a member and may read another Vec2's private fields directly,
  while the non-member operator<< used to print must be a friend.
template: |
  #include <iostream>
  class Vec2 {
  public:
      Vec2(double x, double y) : x_(x), y_(y) {}
      Vec2 operator+(const Vec2& o) const { return Vec2(x_ + o.x_, y_ + o.y_); }
      friend std::ostream& operator<<(std::ostream& os, const Vec2& v) {
          return os << "(" << v.x_ << ", " << v.y_ << ")";
      }
  private:
      double x_, y_;
  };
  int main() {
      Vec2 a(1.0, 2.0);
      Vec2 b(3.0, 4.0);
      std::cout << "a + b = " << (a + b) << "\n";
  }
