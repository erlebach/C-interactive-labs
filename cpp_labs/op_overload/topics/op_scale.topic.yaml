id: op_scale
name: "operator* (non-member)"
group: Operators
doc_url: https://en.cppreference.com/w/cpp/language/operators
has_ptrdata: false
explanation: >-
  When the left operand is not your type, the operator cannot be a member. For
  2.0 * a the left operand is a double, so operator* must be a non-member (free)
  function taking the scalar and the vector. Because Vec2 is a class with private
  data, that non-member operator* is a friend so it can read x_ and y_. The two
  cases below compile independently — the correct friend version prints, and the
  common mistake (writing operator* as a member) fails to compile because a
  member's left operand would have to be a Vec2, not the scalar 2.0.
template: |
  #include <iostream>
  class Vec2 {
  public:
      Vec2(double x, double y) : x_(x), y_(y) {}
      <<member_op>>
      friend std::ostream& operator<<(std::ostream& os, const Vec2& v) {
          return os << "(" << v.x_ << ", " << v.y_ << ")";
      }
  private:
      double x_, y_;
  };
  <<free_op>>
  int main() {
      Vec2 a(1.0, 2.0);
      std::cout << "2 * a = " << (2.0 * a) << "\n";
  }
cases:
  - label: "Correct: friend non-member operator*"
    subs:
      "<<member_op>>": "friend Vec2 operator*(double s, const Vec2& v);"
      "<<free_op>>": |-
        Vec2 operator*(double s, const Vec2& v) { return Vec2(s * v.x_, s * v.y_); }
  - label: "Mistake: operator* as a member  (compile error)"
    subs:
      "<<member_op>>": |-
        Vec2 operator*(double s) const { return Vec2(x_ * s, y_ * s); }
      "<<free_op>>": ""
