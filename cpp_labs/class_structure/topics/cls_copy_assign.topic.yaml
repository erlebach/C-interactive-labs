id: cls_copy_assign
name: "copy assignment operator"
group: Class Structure
doc_url: https://en.cppreference.com/w/cpp/language/copy_assignment
has_ptrdata: false
explanation: >-
  operator= assigns to an object that ALREADY exists — unlike the copy
  constructor, which builds a new one. It must release the old resource, guard
  against self-assignment ("a = a"), copy the source, and return *this so
  assignments chain: "a = b = c".
template: |
  #include <iostream>
  class Buffer {
  public:
      Buffer(int n) : data_(new int[n]{}), n_(n) {}
      Buffer(const Buffer& o) : data_(new int[o.n_]), n_(o.n_) {
          for (int i = 0; i < n_; ++i) data_[i] = o.data_[i];
      }
      // copy assignment: assign to an object that already exists
      Buffer& operator=(const Buffer& o) {
          // guard against self-assignment (a = a)
          if (this == &o) return *this;
          // release the old resource before taking the new one
          delete[] data_;
          n_ = o.n_;
          data_ = new int[n_];
          for (int i = 0; i < n_; ++i) data_[i] = o.data_[i];
          std::cout << "copy assign: replaced contents ("
                    << n_ << " ints)\n";
          // return *this so assignments chain: a = b = c
          return *this;
      }
      ~Buffer() { delete[] data_; }
      int size() const { return n_; }
  private:
      int* data_;
      int  n_;
  };
  int main() {
      Buffer a(3), b(1);
      // copy assignment: b already exists, so its old buffer is released first
      b = a;
      std::cout << "b now holds "
                << b.size() << " ints\n";
  }
