id: cls_init_list
name: "initializer_list constructor"
group: Class Structure
doc_url: https://en.cppreference.com/w/cpp/utility/initializer_list
has_ptrdata: false
explanation: >-
  A std::initializer_list<T> constructor lets an object be built from a brace
  list: "Buffer b{10, 20, 30}". When such a constructor exists, brace
  initialization PREFERS it over other constructors — so "Buffer b{3}" would make
  a one-element list, not call Buffer(int). That overload-resolution subtlety is
  the main gotcha to remember.
template: |
  #include <iostream>
  #include <initializer_list>
  class Buffer {
  public:
      Buffer(std::initializer_list<int> init)
          : data_(new int[init.size()]), n_(static_cast<int>(init.size())) {
          int i = 0;
          for (int v : init) data_[i++] = v;
          std::cout << "init-list ctor: " << n_ << " ints\n";
      }
      ~Buffer() { delete[] data_; }
      int size() const { return n_; }
      int operator[](int i) const { return data_[i]; }
  private:
      int* data_;
      int  n_;
  };
  int main() {
      Buffer b{10, 20, 30, 40};      // brace list selects the initializer_list ctor
      std::cout << "b = {";
      for (int i = 0; i < b.size(); ++i) std::cout << b[i] << (i + 1 < b.size() ? ", " : "");
      std::cout << "}\n";
  }
